name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run tests
        env:
          PYTHONPATH: _shared
        run: python -m pytest tests/ -v --cov=lib --cov-report=term-missing

      - name: Lint with ruff
        run: pip install ruff && ruff check _shared/

      - name: Run documentation drift check
        env:
          PYTHONPATH: _shared
        run: python .github/skills/fabric-test/scripts/check-drift.py --check
